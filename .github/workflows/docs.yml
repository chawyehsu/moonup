name: Deploy Docs

on:
  push:
    branches: [main]
    paths: [docs/**]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: "Iv23lifYx9gjogZQFf6X"
          private-key: ${{ secrets.RELEASE_MAID_PRIVATE_KEY }}
          repositories: moonbit-binaries

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm install

      - name: Build
        working-directory: docs
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@1ef5a1b1df4c63fe21a2242edbee6cac921ece01 # v4.1.0
        with:
          personal_token: ${{ steps.app-token.outputs.token }}
          external_repository: chawyehsu/moonbit-binaries
          publish_branch: gh-pages
          publish_dir: docs/.vitepress/dist
          keep_files: true
