name: Lint Pull Request

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Title
        uses: chawyehsu/actions/semantic-pr-title@9773d15823b8c49b477a78ae968355a3e8fe5cda # v1.2.0
