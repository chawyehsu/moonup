[workspace]
name = "moonup"
authors = ["Chawye Hsu <su+git@chawyehsu.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[tasks]
build = "cargo build"
build-release = "cargo build --release"
test = { cmd = "cargo insta test --review", env = { LANG = "en_US.UTF-8", CARGO_TARGET_DIR = "target/insta" } }
test-all = { cmd = "cargo insta test --review --all-features", env = { LANG = "en_US.UTF-8", CARGO_TARGET_DIR = "target/insta" } }

[dependencies]
actionlint = ">=1.7.8,<2"
prek = ">=0.3.13,<0.4"
pre-commit-hooks = ">=5.0.0,<6"
typos = ">=1.29.5,<2"
# build dependencies
rust = "~=1.95.0"
rust-src = "~=1.95.0"
c-compiler = ">=1.9.0,<2"     # MSVC v142/VS2019 Build Tools is required on Windows
openssl = ">=3.4.0,<4"
pkg-config = ">=0.29.2,<0.30"
cargo-insta = ">=1.43.2,<2"
